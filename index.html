<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OpenGov Pulse — Community Operations Center</title>
<meta name="description" content="OpenGov Pulse: the unified community operations intelligence platform. Hardware-software convergence for local government." />

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blurple: #4B3FFF;
    --blurple-lite: #5069FF;
    --dark: #31414E;
    --med: #7F8CA0;
    --lite: #DCE6F4;
    --orange: #F86A0B;
    --green: #08A847;
    --red: #DE3423;
    --yellow: #FFB636;
    --blue: #0095DA;
    --purple: #B056FF;
    --white: #FFFFFF;
    --g25: #F4F6F9;
    --g50: #ECEEF1;
    --g100: #E0E2E5;
    --g150: #D3D5D8;
    --g200: #C6C8CA;
    --g300: #ADAFB1;
    --g400: #959698;
    --g500: #7C7D7F;
    --g600: #636465;
    --g700: #4A4B4C;
    --g800: #323233;
  }
  html, body { height: 100%; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--g25);
    color: var(--dark);
    overflow: hidden;
    font-size: 13px;
    line-height: 1.45;
  }
  #root { height: 100vh; display: flex; flex-direction: column; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea { font-family: inherit; }

  /* ─────────────── Top bar ─────────────── */
  .topbar { background: var(--dark); height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; border-bottom: 1px solid #1f2a33; }
  .topbar-left { display: flex; align-items: center; gap: 18px; }
  .topbar-logo { height: 22px; width: auto; }
  .topbar-product { font-size: 11px; font-weight: 600; color: var(--white); letter-spacing: 1.2px; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; background: var(--blurple); }
  .topbar-city { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 6px; background: rgba(255,255,255,0.06); cursor: pointer; }
  .topbar-city-name { font-size: 13px; font-weight: 600; color: var(--white); }
  .topbar-city-meta { font-size: 11px; color: #8b9aab; font-family: 'DM Mono', monospace; }
  .topbar-right { display: flex; align-items: center; gap: 14px; }
  .topbar-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #8b9aab; font-family: 'DM Mono', monospace; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 0 rgba(8,168,71,0.7); animation: pulse 2s infinite; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(8,168,71,0.7); }
    70% { box-shadow: 0 0 0 8px rgba(8,168,71,0); }
    100% { box-shadow: 0 0 0 0 rgba(8,168,71,0); }
  }
  .bell { position: relative; cursor: pointer; padding: 6px; border-radius: 6px; }
  .bell:hover { background: rgba(255,255,255,0.08); }
  .bell-badge { position: absolute; top: 2px; right: 2px; min-width: 16px; height: 16px; border-radius: 8px; background: var(--orange); color: var(--white); font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--blurple); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--white); }

  /* ─────────────── Scene tabs ─────────────── */
  .scene-tabs { background: var(--white); border-bottom: 1px solid var(--g100); display: flex; align-items: center; padding: 0 20px; height: 44px; flex-shrink: 0; gap: 4px; }
  .scene-tab { display: flex; align-items: center; gap: 8px; padding: 0 16px; height: 44px; font-size: 13px; font-weight: 600; color: var(--g500); border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .scene-tab:hover { color: var(--dark); }
  .scene-tab.active { color: var(--blurple); border-bottom-color: var(--blurple); }
  .scene-tab svg { width: 16px; height: 16px; }
  .scene-tab-num { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--g400); padding: 2px 6px; background: var(--g50); border-radius: 4px; font-weight: 500; }
  .scene-tab.active .scene-tab-num { color: var(--blurple); background: rgba(75,63,255,0.1); }

  /* ─────────────── KPI strip ─────────────── */
  .kpi-strip { background: var(--white); border-bottom: 1px solid var(--g100); padding: 12px 20px; display: flex; gap: 32px; flex-shrink: 0; overflow-x: auto; }
  .kpi { display: flex; flex-direction: column; gap: 2px; min-width: max-content; }
  .kpi-label { font-size: 10px; font-weight: 500; color: var(--med); text-transform: uppercase; letter-spacing: 0.8px; font-family: 'DM Mono', monospace; }
  .kpi-value { font-size: 18px; font-weight: 700; color: var(--dark); display: flex; align-items: baseline; gap: 6px; }
  .kpi-unit { font-size: 11px; font-weight: 500; color: var(--g500); }
  .kpi-delta { font-size: 11px; font-weight: 600; padding: 1px 6px; border-radius: 4px; }
  .kpi-delta.up { color: var(--green); background: rgba(8,168,71,0.1); }
  .kpi-delta.down { color: var(--red); background: rgba(222,52,35,0.1); }
  .kpi-delta.flat { color: var(--g500); background: var(--g50); }

  /* ─────────────── Main scene area ─────────────── */
  .scene { flex: 1; overflow: hidden; position: relative; }

  /* ─────────────── Operations Map ─────────────── */
  .ops-layout { display: grid; grid-template-columns: 280px 1fr 360px; height: 100%; }
  .ops-left { background: var(--white); border-right: 1px solid var(--g100); overflow-y: auto; }
  .ops-right { background: var(--white); border-left: 1px solid var(--g100); overflow-y: auto; }
  .ops-map { position: relative; }
  #map { width: 100%; height: 100%; background: #e8eef5; }
  .panel-section { padding: 16px 20px; border-bottom: 1px solid var(--g50); }
  .panel-section-title { font-size: 10px; font-weight: 600; color: var(--med); text-transform: uppercase; letter-spacing: 0.8px; font-family: 'DM Mono', monospace; margin-bottom: 10px; }
  .panel-h2 { font-size: 14px; font-weight: 700; color: var(--dark); margin-bottom: 4px; }
  .panel-sub { font-size: 12px; color: var(--g500); }

  .layer-list { display: flex; flex-direction: column; gap: 4px; }
  .layer-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; cursor: pointer; }
  .layer-row:hover { background: var(--g25); }
  .layer-row.active { background: rgba(75,63,255,0.06); }
  .layer-checkbox { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--g300); display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--white); }
  .layer-row.active .layer-checkbox { background: var(--blurple); border-color: var(--blurple); }
  .layer-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .layer-name { flex: 1; font-size: 12px; font-weight: 500; color: var(--dark); }
  .layer-count { font-size: 10px; color: var(--g500); font-family: 'DM Mono', monospace; }

  .source-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; font-size: 12px; }
  .source-name { display: flex; align-items: center; gap: 8px; color: var(--dark); font-weight: 500; }
  .source-dot { width: 8px; height: 8px; border-radius: 50%; }
  .source-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--g500); }

  /* Map overlay controls */
  .map-overlay { position: absolute; z-index: 500; pointer-events: none; }
  .map-overlay > * { pointer-events: auto; }
  .map-search { position: absolute; top: 14px; left: 14px; right: 14px; max-width: 420px; background: var(--white); border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); padding: 8px 14px; display: flex; align-items: center; gap: 10px; z-index: 500; }
  .map-search input { border: none; outline: none; flex: 1; font-size: 13px; color: var(--dark); }
  .map-legend { position: absolute; bottom: 14px; left: 14px; background: var(--white); border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 12px 14px; z-index: 500; min-width: 200px; }
  .map-legend-title { font-size: 10px; font-weight: 600; color: var(--med); text-transform: uppercase; letter-spacing: 0.8px; font-family: 'DM Mono', monospace; margin-bottom: 8px; }
  .legend-row { display: flex; align-items: center; gap: 8px; font-size: 11px; padding: 2px 0; }
  .legend-bar { width: 12px; height: 12px; border-radius: 2px; }
  .map-zoom { position: absolute; bottom: 14px; right: 14px; background: var(--white); border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; z-index: 500; }
  .map-zoom button { width: 32px; height: 32px; border-bottom: 1px solid var(--g100); font-size: 16px; font-weight: 600; color: var(--dark); }
  .map-zoom button:last-child { border-bottom: none; }
  .map-zoom button:hover { background: var(--g25); }

  /* Right rail object cards */
  .obj-card { padding: 12px 16px; border-bottom: 1px solid var(--g50); cursor: pointer; }
  .obj-card:hover { background: var(--g25); }
  .obj-card.selected { background: rgba(75,63,255,0.04); border-left: 3px solid var(--blurple); padding-left: 13px; }
  .obj-card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .obj-type-badge { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.4px; font-family: 'DM Mono', monospace; }
  .obj-card-id { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--g500); margin-left: auto; }
  .obj-card-title { font-size: 13px; font-weight: 600; color: var(--dark); margin-bottom: 4px; }
  .obj-card-meta { font-size: 11px; color: var(--g500); display: flex; gap: 10px; }

  /* Severity badges */
  .sev-critical { background: rgba(222,52,35,0.1); color: var(--red); }
  .sev-high { background: rgba(248,106,11,0.12); color: var(--orange); }
  .sev-medium { background: rgba(255,182,54,0.15); color: #b87a00; }
  .sev-low { background: rgba(0,149,218,0.1); color: var(--blue); }
  .sev-good { background: rgba(8,168,71,0.1); color: var(--green); }

  /* Status pills */
  .status-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 10px; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.4px; }
  .pill-open { background: rgba(248,106,11,0.12); color: var(--orange); }
  .pill-active { background: rgba(0,149,218,0.1); color: var(--blue); }
  .pill-resolved { background: rgba(8,168,71,0.1); color: var(--green); }
  .pill-pending { background: var(--g50); color: var(--g600); }
  .pill-overdue { background: rgba(222,52,35,0.1); color: var(--red); }

  /* ─────────────── Signal Stream ─────────────── */
  .signal-layout { display: grid; grid-template-columns: 1fr 380px; height: 100%; }
  .signal-main { overflow-y: auto; padding: 20px 24px; }
  .signal-side { background: var(--white); border-left: 1px solid var(--g100); overflow-y: auto; }

  .signal-filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .filter-chip { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 16px; background: var(--white); border: 1px solid var(--g100); font-size: 12px; font-weight: 500; color: var(--g600); cursor: pointer; }
  .filter-chip:hover { border-color: var(--g300); }
  .filter-chip.active { background: var(--blurple); border-color: var(--blurple); color: var(--white); }
  .filter-chip-count { font-family: 'DM Mono', monospace; font-size: 10px; opacity: 0.7; }

  .signal-list { display: flex; flex-direction: column; gap: 8px; }
  .signal-item { background: var(--white); border-radius: 10px; padding: 14px 18px; border: 1px solid var(--g100); display: grid; grid-template-columns: auto 1fr auto; gap: 14px; align-items: flex-start; cursor: pointer; transition: border-color 0.15s; }
  .signal-item:hover { border-color: var(--g300); box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
  .signal-item.new { border-left: 3px solid var(--blurple); animation: slideIn 0.4s ease-out; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .signal-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .signal-icon-cyvl { background: rgba(75,63,255,0.1); color: var(--blurple); }
  .signal-icon-tele { background: rgba(0,149,218,0.1); color: var(--blue); }
  .signal-icon-ai { background: rgba(176,86,255,0.12); color: var(--purple); }
  .signal-icon-iot { background: rgba(8,168,71,0.1); color: var(--green); }
  .signal-icon-cit { background: rgba(248,106,11,0.12); color: var(--orange); }

  .signal-body { min-width: 0; }
  .signal-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .signal-source { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 600; color: var(--med); text-transform: uppercase; letter-spacing: 0.5px; }
  .signal-time { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--g400); }
  .signal-title { font-size: 14px; font-weight: 600; color: var(--dark); margin-bottom: 4px; line-height: 1.3; }
  .signal-detail { font-size: 12px; color: var(--g500); line-height: 1.5; }
  .signal-meta { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
  .signal-meta-item { font-size: 11px; color: var(--g500); display: flex; align-items: center; gap: 4px; }
  .signal-meta-item strong { color: var(--dark); font-weight: 600; }
  .signal-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; flex-shrink: 0; }
  .sev-badge { font-size: 9px; font-weight: 700; padding: 3px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.4px; font-family: 'DM Mono', monospace; }

  /* ─────────────── Object Explorer ─────────────── */
  .explorer-layout { display: grid; grid-template-columns: 320px 1fr; height: 100%; }
  .explorer-list { background: var(--white); border-right: 1px solid var(--g100); overflow-y: auto; }
  .explorer-detail { overflow-y: auto; padding: 24px 28px 80px; background: var(--g25); }

  .explorer-search { padding: 14px 16px; border-bottom: 1px solid var(--g100); }
  .explorer-search-box { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--g25); border-radius: 6px; }
  .explorer-search-box input { flex: 1; border: none; background: transparent; outline: none; font-size: 13px; }
  .explorer-categories { padding: 8px 0; border-bottom: 1px solid var(--g100); }
  .cat-row { display: flex; align-items: center; gap: 10px; padding: 8px 16px; cursor: pointer; }
  .cat-row:hover { background: var(--g25); }
  .cat-row.active { background: rgba(75,63,255,0.06); border-left: 3px solid var(--blurple); padding-left: 13px; }
  .cat-icon { width: 20px; display: flex; align-items: center; justify-content: center; }
  .cat-name { flex: 1; font-size: 12px; font-weight: 500; }
  .cat-count { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--g500); }

  .detail-head { background: var(--white); border-radius: 14px; padding: 24px 28px; border: 1px solid var(--g100); margin-bottom: 16px; }
  .detail-breadcrumb { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--g500); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .detail-title { font-size: 22px; font-weight: 700; color: var(--dark); margin-bottom: 4px; }
  .detail-sub { font-size: 13px; color: var(--g500); margin-bottom: 14px; }
  .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-primary { background: var(--blurple); color: var(--white); padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary:hover { background: var(--blurple-lite); }
  .btn-secondary { background: var(--white); color: var(--blurple); border: 1px solid var(--blurple); padding: 7px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
  .btn-secondary:hover { background: rgba(75,63,255,0.04); }
  .btn-ghost { background: transparent; color: var(--g600); border: 1px solid var(--g200); padding: 7px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
  .btn-ghost:hover { background: var(--g25); }

  .detail-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--g100); margin-top: 18px; }
  .detail-tab { padding: 10px 16px; font-size: 12px; font-weight: 600; color: var(--g500); border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .detail-tab:hover { color: var(--dark); }
  .detail-tab.active { color: var(--blurple); border-bottom-color: var(--blurple); }

  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .detail-card { background: var(--white); border-radius: 12px; padding: 18px 22px; border: 1px solid var(--g100); }
  .detail-card-title { font-size: 12px; font-weight: 700; color: var(--dark); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
  .detail-card-title .meta { font-size: 10px; color: var(--g500); font-family: 'DM Mono', monospace; font-weight: 500; }
  .field-row { display: grid; grid-template-columns: 130px 1fr; gap: 10px; padding: 6px 0; font-size: 12px; border-bottom: 1px solid var(--g50); }
  .field-row:last-child { border-bottom: none; }
  .field-label { color: var(--g500); font-weight: 500; }
  .field-value { color: var(--dark); font-weight: 500; }
  .field-value.mono { font-family: 'DM Mono', monospace; font-size: 11px; }

  /* Streetview placeholder */
  .streetview { width: 100%; height: 200px; border-radius: 10px; background: linear-gradient(135deg, #c9d6e8 0%, #9aaec5 100%); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.95); margin-bottom: 12px; }
  .streetview::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.4)), repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,0,0,0.04) 40px, rgba(0,0,0,0.04) 80px); }
  .streetview-meta { position: absolute; bottom: 10px; left: 14px; font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.95); display: flex; gap: 10px; z-index: 1; }
  .streetview-tag { padding: 3px 8px; border-radius: 4px; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
  .streetview-cyvl-mark { position: absolute; z-index: 1; }
  .streetview-cyvl-mark .ring { width: 60px; height: 60px; border-radius: 50%; border: 2px dashed rgba(255,255,255,0.85); animation: spin 8s linear infinite; }
  @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
  .streetview-cyvl-mark .label { position: absolute; top: 65px; left: 50%; transform: translateX(-50%); font-family: 'DM Mono', monospace; font-size: 10px; background: rgba(75,63,255,0.95); color: white; padding: 3px 8px; border-radius: 4px; white-space: nowrap; }

  /* Timeline */
  .timeline { position: relative; padding-left: 22px; }
  .timeline::before { content: ''; position: absolute; left: 7px; top: 8px; bottom: 8px; width: 2px; background: var(--g100); }
  .timeline-item { position: relative; padding: 8px 0 12px; }
  .timeline-item::before { content: ''; position: absolute; left: -18px; top: 13px; width: 10px; height: 10px; border-radius: 50%; background: var(--white); border: 2px solid var(--blurple); }
  .timeline-item.done::before { background: var(--blurple); }
  .timeline-item.warn::before { border-color: var(--orange); }
  .timeline-time { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--g500); }
  .timeline-title { font-size: 12px; font-weight: 600; color: var(--dark); margin-top: 2px; }
  .timeline-desc { font-size: 11px; color: var(--g500); margin-top: 2px; }
  .timeline-source { font-family: 'DM Mono', monospace; font-size: 9px; padding: 2px 6px; border-radius: 3px; background: var(--g50); color: var(--g600); display: inline-block; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.4px; }

  /* Related records */
  .rel-item { display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--g50); cursor: pointer; }
  .rel-item:last-child { border-bottom: none; }
  .rel-item:hover { background: var(--g25); margin: 0 -12px; padding: 10px 12px; border-radius: 6px; }
  .rel-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--g50); display: flex; align-items: center; justify-content: center; }
  .rel-title { font-size: 12px; font-weight: 600; color: var(--dark); }
  .rel-sub { font-size: 11px; color: var(--g500); margin-top: 2px; }
  .rel-arrow { color: var(--g300); font-size: 14px; }

  /* ─────────────── Closed-Loop Workflow ─────────────── */
  .workflow-layout { display: grid; grid-template-columns: 320px 1fr; height: 100%; }

    case "sparkles": return <svg {...props}><path d="M12 3l1.9 5.8a2 2 0 0 0 1.3 1.3L21 12l-5.8 1.9a2 2 0 0 0-1.3 1.3L12 21l-1.9-5.8a2 2 0 0 0-1.3-1.3L3 12l5.8-1.9a2 2 0 0 0 1.3-1.3z"/></svg>;
    case "database": return <svg {...props}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/></svg>;
    case "cube": return <svg {...props}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>;
    case "wifi": return <svg {...props}><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>;
    case "navigation": return <svg {...props}><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>;
    case "link": return <svg {...props}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>;
    default: return <svg {...props}><circle cx="12" cy="12" r="9"/></svg>;
  }
};

// ─────────────────────────────────────────────────────────────────
// Operations Map scene
// ─────────────────────────────────────────────────────────────────
const LAYERS = [
  { key: "pavement", label: "Pavement (PCI)", color: "#4B3FFF", count: PAVEMENT.length, default: true },
  { key: "ada", label: "ADA Ramps", color: "#B056FF", count: ADA_RAMPS.length, default: true },
  { key: "signs", label: "Signs", color: "#0095DA", count: SIGNS.length, default: false },
  { key: "catch", label: "Catch Basins", color: "#08A847", count: CATCH_BASINS.length, default: false },
  { key: "cases", label: "Code Cases", color: "#F86A0B", count: CODE_CASES.length, default: true },
  { key: "permits", label: "Permits", color: "#5069FF", count: PERMITS.length, default: true },
  { key: "fleet", label: "Fleet (Live)", color: "#DE3423", count: VEHICLES.length, default: true },
  { key: "cyvl", label: "CYVL Coverage", color: "#FFB636", count: 1, default: false }
];

const OperationsMap = ({ onSelectObject, selected }) => {
  const mapRef = React.useRef(null);
  const layersRef = React.useRef({});
  const [activeLayers, setActiveLayers] = React.useState(() => {
    const obj = {};
    LAYERS.forEach(l => obj[l.key] = l.default);
    return obj;
  });

  const pciColor = (pci) => {
    if (pci >= 85) return "#08A847";
    if (pci >= 70) return "#5DC14C";
    if (pci >= 55) return "#FFB636";
    if (pci >= 40) return "#F86A0B";
    return "#DE3423";
  };
  const sevColor = (sev) => sev === "critical" ? "#DE3423" : sev === "high" ? "#F86A0B" : sev === "medium" ? "#FFB636" : "#0095DA";

  React.useEffect(() => {
    if (mapRef.current) return;
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(CITY.center, 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 19, subdomains: 'abcd' }).addTo(map);
    mapRef.current = map;

    // Layer groups
    layersRef.current.pavement = L.layerGroup();
    PAVEMENT.forEach(p => {
      const line = L.polyline(p.coords, { color: pciColor(p.pci), weight: 5, opacity: 0.85 });
      line.bindPopup(`<strong>${p.id}</strong><br/>${p.name}<br/>PCI <strong style="color:${pciColor(p.pci)}">${p.pci}</strong> · trend ${p.pciTrend}/yr<br/>${p.surface} · ${p.laneMiles} ln-mi`);
      line.on('click', () => onSelectObject(p));
      layersRef.current.pavement.addLayer(line);
    });

    layersRef.current.ada = L.layerGroup();
    ADA_RAMPS.forEach(r => {
      const compColor = r.compliance === "Non-compliant" ? "#DE3423" : r.compliance === "Marginal" ? "#FFB636" : "#08A847";
      const m = L.circleMarker(r.location, { radius: 5, fillColor: compColor, color: "#fff", weight: 2, fillOpacity: 0.9 });
      m.bindPopup(`<strong>${r.id}</strong><br/>${r.name}<br/>Slope ${r.slope}° · ${r.compliance}`);
      m.on('click', () => onSelectObject(r));
      layersRef.current.ada.addLayer(m);
    });

    layersRef.current.signs = L.layerGroup();
    SIGNS.forEach(s => {
      const c = s.condition === "Damaged" ? "#DE3423" : s.condition === "Poor" ? "#F86A0B" : s.condition === "Fair" ? "#FFB636" : "#0095DA";
      const m = L.circleMarker(s.location, { radius: 4, fillColor: c, color: "#fff", weight: 1.5, fillOpacity: 0.9 });
      m.bindPopup(`<strong>${s.id}</strong><br/>${s.name}<br/>${s.condition}${s.permitted ? "" : " · <span style='color:#DE3423'>UNPERMITTED</span>"}`);
      m.on('click', () => onSelectObject(s));
      layersRef.current.signs.addLayer(m);
    });

    layersRef.current.catch = L.layerGroup();
    CATCH_BASINS.forEach(b => {
      const c = b.condition === "Blocked" ? "#DE3423" : b.condition === "Partial blockage" ? "#FFB636" : "#08A847";
      const m = L.circleMarker(b.location, { radius: 4, fillColor: c, color: "#fff", weight: 1.5, fillOpacity: 0.9 });
      m.bindPopup(`<strong>${b.id}</strong><br/>${b.name}<br/>${b.condition}`);
      m.on('click', () => onSelectObject(b));
      layersRef.current.catch.addLayer(m);
    });

    layersRef.current.cases = L.layerGroup();
    CODE_CASES.forEach(c => {
      const col = sevColor(c.severity);
      const html = `<div style="background:${col};color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3);font-size:11px;font-weight:700;">!</div>`;
      const m = L.marker(c.location, { icon: L.divIcon({ html, className: '', iconSize: [22,22], iconAnchor: [11,11] }) });
      m.bindPopup(`<strong>${c.id}</strong><br/>${c.title}<br/>${c.address}<br/><span style="color:${col};font-weight:700">${c.severity.toUpperCase()}</span> · ${c.status}`);
      m.on('click', () => onSelectObject(c));
      layersRef.current.cases.addLayer(m);
    });

    layersRef.current.permits = L.layerGroup();
    PERMITS.forEach(p => {
      const html = `<div style="background:#5069FF;color:#fff;border-radius:4px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3);font-size:11px;font-weight:700;">P</div>`;
      const m = L.marker(p.location, { icon: L.divIcon({ html, className: '', iconSize: [22,22], iconAnchor: [11,11] }) });
      m.bindPopup(`<strong>${p.id}</strong><br/>${p.title}<br/>${p.address}<br/>${p.status} · expires ${p.expires}`);
      m.on('click', () => onSelectObject(p));
      layersRef.current.permits.addLayer(m);
    });

    layersRef.current.fleet = L.layerGroup();
    VEHICLES.forEach(v => {
      const html = `<div style="background:${v.color};color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);font-size:14px;">${v.icon}</div>`;
      const m = L.marker(v.location, { icon: L.divIcon({ html, className: '', iconSize: [28,28], iconAnchor: [14,14] }) });
      m.bindPopup(`<strong>${v.id} · ${v.name}</strong><br/>${v.yearMakeModel}<br/>${v.speed} mph · fuel ${v.fuelPct}%${v.fault ? "<br/><span style='color:#DE3423;font-weight:700'>⚠ "+v.fault+"</span>" : ""}`);
      m.on('click', () => onSelectObject(v));
      layersRef.current.fleet.addLayer(m);
    });

    // CYVL coverage = stylized polygon overlays for "recent survey corridors"
    layersRef.current.cyvl = L.layerGroup();
    const corridors = [
      [[38.029, -78.495], [38.029, -78.46]],
      [[38.038, -78.49], [38.038, -78.45]],
      [[38.018, -78.498], [38.018, -78.462]],
      [[38.022, -78.49], [38.046, -78.46]]
    ];
    corridors.forEach(c => {
      const line = L.polyline(c, { color: '#FFB636', weight: 14, opacity: 0.18, dashArray: '0' });
      layersRef.current.cyvl.addLayer(line);
    });

    // initial layer state
    Object.keys(layersRef.current).forEach(k => {
      if (activeLayers[k]) layersRef.current[k].addTo(map);
    });
  }, []);

  // Toggle layers
  React.useEffect(() => {
    const map = mapRef.current; if (!map) return;
    Object.keys(layersRef.current).forEach(k => {
      if (activeLayers[k]) {
        if (!map.hasLayer(layersRef.current[k])) map.addLayer(layersRef.current[k]);
      } else {
        if (map.hasLayer(layersRef.current[k])) map.removeLayer(layersRef.current[k]);
      }
    });
  }, [activeLayers]);

  const toggleLayer = (k) => setActiveLayers(s => ({ ...s, [k]: !s[k] }));
  const zoomIn = () => mapRef.current?.zoomIn();
  const zoomOut = () => mapRef.current?.zoomOut();

  // Right-rail "operational priorities" — derived from data
  const priorities = [
    ...CODE_CASES.filter(c => c.severity === "critical" || c.severity === "high"),
    ...VEHICLES.filter(v => v.fault).map(v => ({ ...v, severity: "high", title: `Fleet fault: ${v.fault}`, address: v.name })),
    ...PAVEMENT.filter(p => p.pci < 50).slice(0, 6).map(p => ({ ...p, type: "Pavement", severity: p.pci < 40 ? "critical" : "high", title: `Critical PCI: ${p.pci}`, address: p.name }))
  ].slice(0, 12);

  return (
    <div className="ops-layout">
      {/* Left rail — layers */}
      <div className="ops-left">
        <div className="panel-section">
          <div className="panel-h2">Map Layers</div>
          <div className="panel-sub">Toggle data sources on the map.</div>
        </div>
        <div className="panel-section">
          <div className="panel-section-title">Asset Inventory</div>
          <div className="layer-list">
            {LAYERS.slice(0,4).map(l => (
              <div key={l.key} className={"layer-row" + (activeLayers[l.key] ? " active" : "")} onClick={() => toggleLayer(l.key)}>
                <div className="layer-checkbox">{activeLayers[l.key] && <Icon name="check-circle" size={10} color="#fff"/>}</div>
                <div className="layer-swatch" style={{background: l.color}}></div>
                <div className="layer-name">{l.label}</div>
                <div className="layer-count">{l.count}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="panel-section">
          <div className="panel-section-title">Regulatory · Workflows</div>
          <div className="layer-list">
            {LAYERS.slice(4,7).map(l => (
              <div key={l.key} className={"layer-row" + (activeLayers[l.key] ? " active" : "")} onClick={() => toggleLayer(l.key)}>
                <div className="layer-checkbox">{activeLayers[l.key] && <Icon name="check-circle" size={10} color="#fff"/>}</div>
                <div className="layer-swatch" style={{background: l.color}}></div>
                <div className="layer-name">{l.label}</div>
                <div className="layer-count">{l.count}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="panel-section">
          <div className="panel-section-title">Sensor Layers</div>
          <div className="layer-list">
            <div className={"layer-row" + (activeLayers.cyvl ? " active" : "")} onClick={() => toggleLayer("cyvl")}>
              <div className="layer-checkbox">{activeLayers.cyvl && <Icon name="check-circle" size={10} color="#fff"/>}</div>
              <div className="layer-swatch" style={{background: '#FFB636'}}></div>
              <div className="layer-name">CYVL Survey Coverage</div>
              <div className="layer-count">94%</div>
            </div>
          </div>
        </div>
        <div className="panel-section">
          <div className="panel-section-title">Live Data Sources</div>
          <div className="source-row">
            <div className="source-name"><span className="source-dot" style={{background:"#08A847"}}></span> CYVL Fleet Survey</div>
            <div className="source-meta">live · 4m</div>
          </div>
          <div className="source-row">
            <div className="source-name"><span className="source-dot" style={{background:"#08A847"}}></span> Geotab Telematics</div>
            <div className="source-meta">live · 12s</div>
          </div>
          <div className="source-row">
            <div className="source-name"><span className="source-dot" style={{background:"#08A847"}}></span> 311 Citizen Reports</div>
            <div className="source-meta">live · 2m</div>
          </div>
          <div className="source-row">
            <div className="source-name"><span className="source-dot" style={{background:"#08A847"}}></span> IoT Catch Basin Sensors</div>
            <div className="source-meta">live · 30s</div>
          </div>
          <div className="source-row">
            <div className="source-name"><span className="source-dot" style={{background:"#FFB636"}}></span> Satellite (Tier 1)</div>
            <div className="source-meta">monthly</div>
          </div>
        </div>
      </div>

      {/* Map */}
      <div className="ops-map">
        <div id="map"></div>
        <div className="map-search">
          <Icon name="search" size={14} color="#7C7D7F"/>
          <input placeholder="Search assets, parcels, permits, addresses..." />
          <kbd style={{fontFamily:"'DM Mono', monospace", fontSize:10, color:"#7C7D7F", background:"#F4F6F9", padding:"2px 6px", borderRadius:4}}>⌘K</kbd>
        </div>
        <div className="map-zoom">
          <button onClick={zoomIn}><Icon name="plus" size={14}/></button>
          <button onClick={zoomOut}><Icon name="minus" size={14}/></button>
        </div>
        <div className="map-legend">
          <div className="map-legend-title">PCI Score (Pavement)</div>
          <div className="legend-row"><span className="legend-bar" style={{background:"#08A847"}}></span> Excellent (85–100)</div>
          <div className="legend-row"><span className="legend-bar" style={{background:"#5DC14C"}}></span> Good (70–84)</div>
          <div className="legend-row"><span className="legend-bar" style={{background:"#FFB636"}}></span> Fair (55–69)</div>
          <div className="legend-row"><span className="legend-bar" style={{background:"#F86A0B"}}></span> Poor (40–54)</div>
          <div className="legend-row"><span className="legend-bar" style={{background:"#DE3423"}}></span> Failed (&lt; 40)</div>
        </div>
      </div>

      {/* Right rail — operational priorities */}
      <div className="ops-right">
        <div className="panel-section">
          <div className="panel-h2">Operational Priorities</div>
          <div className="panel-sub">Highest-priority items across the city right now.</div>
        </div>
        {priorities.map(p => {
          const sevClass = "sev-" + (p.severity || "medium");
          return (
            <div key={p.id} className={"obj-card" + (selected?.id === p.id ? " selected" : "")} onClick={() => onSelectObject(p)}>
              <div className="obj-card-head">
                <span className={"obj-type-badge " + sevClass}>{p.type || "Asset"}</span>
                <span className="obj-card-id">{p.id}</span>
              </div>
              <div className="obj-card-title">{p.title || p.name}</div>
              <div className="obj-card-meta">
                <span>📍 {p.address || ""}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

const SignalStream = ({ onSelectObject }) => {
  const [filter, setFilter] = React.useState("all");
  const [signals, setSignals] = React.useState(SIGNALS);
  const [newIds, setNewIds] = React.useState(new Set());

  // Inject a "fresh" signal every 28s to make stream feel live
  React.useEffect(() => {
    const seed = mulberry32(Date.now() & 0xffff);
    const interval = setInterval(() => {
      const fresh = {
        id: "SIG-" + (9900 + Math.floor(seed() * 100)),
        source: pick(["CYVL", "Telematics", "AI", "IoT", "Citizen"]),
        severity: pick(["critical", "high", "medium", "low"]),
        time: new Date().toISOString(),
        title: pick([
          "New pothole cluster detected on overnight CYVL survey",
          "Sidewalk trip hazard flagged — 3.2cm vertical displacement",
          "Telematics: sudden brake event at high-speed intersection",
          "Smart hydrant FH-118 — flow rate anomaly detected",
          "AI flagged temporary sign on commercial frontage, no permit",
          "Refuse Truck #18 — DTC code P0455 evap large leak"
        ]),
        detail: "Auto-generated demo signal for live-stream simulation. Click to inspect.",
        icon: "scan",
        location: randomLatLng()
      };
      setSignals(s => [fresh, ...s].slice(0, 30));
      setNewIds(n => { const next = new Set(n); next.add(fresh.id); return next; });
      setTimeout(() => setNewIds(n => { const next = new Set(n); next.delete(fresh.id); return next; }), 2500);
    }, 28000);
    return () => clearInterval(interval);
  }, []);

  const counts = signals.reduce((a, s) => { a[s.source] = (a[s.source] || 0) + 1; a.all = (a.all || 0) + 1; return a; }, {});
  const filtered = filter === "all" ? signals : signals.filter(s => s.source === filter);

  const sourceBucket = (src) => {
    const m = { CYVL: "cyvl", Telematics: "tele", AI: "ai", IoT: "iot", Citizen: "cit" };
    return m[src] || "ai";
  };
  const iconForSource = (src) => {
    const m = { CYVL: "scan", Telematics: "truck", AI: "sparkles", IoT: "wifi", Citizen: "user" };
    return m[src] || "activity";
  };

  return (
    <div className="signal-layout">
      <div className="signal-main">
        <div style={{marginBottom: 18}}>
          <div className="panel-h2" style={{fontSize:18, marginBottom:4}}>Live Signal Stream</div>
          <div className="panel-sub">All real-world events flowing into Pulse, fused across data sources and ranked by impact.</div>
        </div>

        <div className="signal-filters">
          <Icon name="filter" size={14} color="#7C7D7F"/>
          {["all", "CYVL", "Telematics", "AI", "IoT", "Citizen"].map(s => (
            <button key={s} className={"filter-chip" + (filter === s ? " active" : "")} onClick={() => setFilter(s)}>
              {s === "all" ? "All sources" : s}
              <span className="filter-chip-count">{counts[s] || 0}</span>
            </button>
          ))}
        </div>

        <div className="signal-list">
          {filtered.map(s => (
            <div key={s.id} className={"signal-item" + (newIds.has(s.id) ? " new" : "")} onClick={() => {
              const linked = ALL_OBJECTS.find(o => o.id === s.linkedTo);
              if (linked) onSelectObject(linked);
            }}>
              <div className={"signal-icon signal-icon-" + sourceBucket(s.source)}>
                <Icon name={iconForSource(s.source)} size={18}/>
              </div>
              <div className="signal-body">
                <div className="signal-head">
                  <span className="signal-source">{s.source}</span>
                  <span className="signal-time">·  {fmtRelative(s.time)}</span>
                </div>

const formatJson = (obj, indent = 0) => {
  if (obj === null) return <span className="nul">null</span>;
  if (typeof obj === "string") return <span className="str">"{obj}"</span>;
  if (typeof obj === "number") return <span className="num">{obj}</span>;
  if (typeof obj === "boolean") return <span className="num">{String(obj)}</span>;
  if (Array.isArray(obj)) {
    return <>[{obj.map((v, i) => <span key={i}>{i>0 && ', '}{formatJson(v, indent)}</span>)}]</>;
  }
  if (typeof obj === "object") {
    const keys = Object.keys(obj);
    return <>{`{`}{"\n"}{keys.map((k, i) => (
      <span key={k}>{"  ".repeat(indent+1)}<span className="key">"{k}"</span>: {formatJson(obj[k], indent+1)}{i<keys.length-1 ? ',' : ''}{"\n"}</span>
    ))}{"  ".repeat(indent)}{`}`}</>;
  }
  return String(obj);
};

    let i = 0;
    const id = setInterval(() => {
      const t = { id: Date.now(), ...lines[i % lines.length] };
      setToasts(ts => [...ts, t]);
      setUnread(u => u + 1);
      setTimeout(() => setToasts(ts => ts.filter(x => x.id !== t.id)), 4500);
      i++;
    }, 22000);
    return () => clearInterval(id);
  }, []);

  return (
    <>
      <TopBar unreadCount={unread} onJumpToSignal={() => { setScene("stream"); setUnread(0); }} />
      <SceneTabs active={scene} onChange={(k) => { setScene(k); if(k === "stream") setUnread(0); }} />
      {scene !== "ask" && scene !== "workflow" && <KpiStrip />}
      <div className="scene">
        {scene === "map" && <OperationsMap onSelectObject={onSelectObject} selected={selected}/>}
        {scene === "stream" && <SignalStream onSelectObject={onSelectObject}/>}
        {scene === "explorer" && <ObjectExplorer selected={selected} onSelectObject={setSelected}/>}
        {scene === "workflow" && <ClosedLoopWorkflow/>}
        {scene === "ask" && <AskPulse/>}
      </div>
      <div className="toast-stack">
        {toasts.map(t => (
          <div key={t.id} className="toast">
            <Icon name="zap" size={16} color="#4B3FFF"/>
            <div>
              <div className="toast-title">{t.title}</div>
              <div className="toast-sub">{t.sub}</div>
            </div>
          </div>
        ))}
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
