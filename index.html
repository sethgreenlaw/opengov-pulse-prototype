<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OpenGov Pulse — Community Operations Center</title>
<meta name="description" content="OpenGov Pulse: real-time anomaly detection and operational response for local government." />

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  /* ─────────────── MUI-style design tokens (OpenGov palette) ─────────────── */
  :root {
    /* Palette — Material UI semantic mapped to OpenGov brand */
    --mui-primary: #4B3FFF;
    --mui-primary-dark: #3D32CC;
    --mui-primary-light: #7166FF;
    --mui-primary-contrast: #FFFFFF;
    --mui-secondary: #F86A0B;
    --mui-secondary-dark: #C45508;
    --mui-error: #DE3423;
    --mui-error-dark: #B12A1C;
    --mui-warning: #FFB636;
    --mui-warning-dark: #C68B22;
    --mui-info: #0095DA;
    --mui-info-dark: #0073A8;
    --mui-success: #08A847;
    --mui-success-dark: #067F36;

    /* Surfaces */
    --mui-bg-default: #F5F5F7;
    --mui-bg-paper: #FFFFFF;
    --mui-bg-app: #0d1620;

    /* Text on light */
    --mui-text-primary: #1A2332;
    --mui-text-secondary: #5C6975;
    --mui-text-disabled: #9DA5B0;

    /* Text on dark */
    --mui-text-on-dark: #FFFFFF;
    --mui-text-on-dark-secondary: rgba(255,255,255,0.72);
    --mui-text-on-dark-disabled: rgba(255,255,255,0.5);

    /* Dividers and lines */
    --mui-divider: rgba(0,0,0,0.08);
    --mui-divider-strong: rgba(0,0,0,0.16);
    --mui-action-hover: rgba(75,63,255,0.04);
    --mui-action-selected: rgba(75,63,255,0.08);

    /* Material elevations */
    --elev-1: 0 2px 1px -1px rgba(0,0,0,0.08), 0 1px 1px 0 rgba(0,0,0,0.06), 0 1px 3px 0 rgba(0,0,0,0.04);
    --elev-2: 0 3px 1px -2px rgba(0,0,0,0.08), 0 2px 2px 0 rgba(0,0,0,0.06), 0 1px 5px 0 rgba(0,0,0,0.05);
    --elev-4: 0 2px 4px -1px rgba(0,0,0,0.10), 0 4px 5px 0 rgba(0,0,0,0.07), 0 1px 10px 0 rgba(0,0,0,0.06);
    --elev-6: 0 3px 5px -1px rgba(0,0,0,0.10), 0 6px 10px 0 rgba(0,0,0,0.07), 0 1px 18px 0 rgba(0,0,0,0.06);
    --elev-8: 0 5px 5px -3px rgba(0,0,0,0.12), 0 8px 10px 1px rgba(0,0,0,0.08), 0 3px 14px 2px rgba(0,0,0,0.06);
    --elev-16: 0 8px 10px -5px rgba(0,0,0,0.14), 0 16px 24px 2px rgba(0,0,0,0.09), 0 6px 30px 5px rgba(0,0,0,0.07);
    --elev-24: 0 11px 15px -7px rgba(0,0,0,0.16), 0 24px 38px 3px rgba(0,0,0,0.10), 0 9px 46px 8px rgba(0,0,0,0.08);

    /* Radii (MUI default 4px, OpenGov uses slightly larger) */
    --r-1: 4px;
    --r-2: 8px;
    --r-3: 12px;
    --r-4: 16px;
    --r-pill: 999px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--mui-bg-app);
    color: var(--mui-text-primary);
    overflow: hidden;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  #root { height: 100vh; display: flex; flex-direction: column; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea { font-family: inherit; }

  /* MUI Typography scale */
  .mui-h6 { font-size: 1.125rem; font-weight: 600; line-height: 1.4; letter-spacing: 0.0075em; color: var(--mui-text-primary); }
  .mui-subtitle1 { font-size: 1rem; font-weight: 500; line-height: 1.5; color: var(--mui-text-primary); }
  .mui-subtitle2 { font-size: 0.875rem; font-weight: 600; line-height: 1.5; color: var(--mui-text-primary); }
  .mui-body1 { font-size: 1rem; font-weight: 400; line-height: 1.55; color: var(--mui-text-primary); }
  .mui-body2 { font-size: 0.8125rem; font-weight: 400; line-height: 1.55; color: var(--mui-text-secondary); }
  .mui-caption { font-size: 0.75rem; font-weight: 400; line-height: 1.45; color: var(--mui-text-secondary); }
  .mui-overline { font-size: 0.6875rem; font-weight: 600; line-height: 1.5; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mui-text-secondary); font-family: 'DM Mono', monospace; }
  .mono { font-family: 'DM Mono', monospace; }

  /* ─────────────── AppBar ─────────────── */
  .appbar {
    background: #19232E;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    flex-shrink: 0;
    box-shadow: var(--elev-4);
    z-index: 1100;
    color: var(--mui-text-on-dark);
  }
  .appbar-left { display: flex; align-items: center; gap: 18px; }
  .appbar-product {
    font-size: 0.6875rem;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: var(--r-1);
    background: var(--mui-primary);
    color: var(--mui-primary-contrast);
  }
  .appbar-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.12); }
  .appbar-context { display: flex; align-items: center; gap: 10px; }
  .appbar-context .name { font-size: 0.875rem; font-weight: 600; color: var(--mui-text-on-dark); }
  .appbar-context .meta { font-size: 0.75rem; color: var(--mui-text-on-dark-secondary); font-family: 'DM Mono', monospace; }

  .engine-status {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 12px;
    background: rgba(8,168,71,0.14);
    border: 1px solid rgba(8,168,71,0.32);
    border-radius: var(--r-1);
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    color: #6FE39A;
  }
  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--mui-success);
    box-shadow: 0 0 0 0 rgba(8,168,71,0.7);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(8,168,71,0.7); }
    70% { box-shadow: 0 0 0 6px rgba(8,168,71,0); }
    100% { box-shadow: 0 0 0 0 rgba(8,168,71,0); }
  }

  .appbar-right { display: flex; align-items: center; gap: 10px; }
  .appbar-search {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.08);
    padding: 7px 12px;
    border-radius: var(--r-1);
    min-width: 320px;
    border: 1px solid transparent;
    transition: all 0.15s;
  }
  .appbar-search:focus-within {
    border-color: var(--mui-primary);
    background: rgba(255,255,255,0.12);
  }
  .appbar-search input {
    background: transparent; border: none; outline: none;
    color: var(--mui-text-on-dark); font-size: 0.8125rem; flex: 1;
  }
  .appbar-search input::placeholder { color: var(--mui-text-on-dark-secondary); }
  .appbar-search kbd {
    font-family: 'DM Mono', monospace; font-size: 0.6875rem;
    color: var(--mui-text-on-dark-secondary);
    background: rgba(255,255,255,0.1);
    padding: 2px 6px; border-radius: 3px;
  }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--mui-primary);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 600;
    color: var(--mui-primary-contrast);
  }

  /* Search results dropdown — MUI Menu styled */
  .search-results {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--mui-bg-paper);
    border-radius: var(--r-1);
    max-height: 360px; overflow-y: auto;
    box-shadow: var(--elev-8);
    z-index: 1200;
    padding: 6px 0;
  }
  .search-result {
    display: grid; grid-template-columns: auto 1fr auto;
    gap: 12px; align-items: center;
    padding: 8px 14px;
    cursor: pointer;
  }
  .search-result:hover { background: var(--mui-action-hover); }
  .search-result-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--mui-bg-default);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .search-result-title { font-size: 0.875rem; color: var(--mui-text-primary); font-weight: 500; }
  .search-result-sub { font-size: 0.75rem; color: var(--mui-text-secondary); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .search-result-type {
    font-size: 0.625rem; color: var(--mui-text-secondary);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 2px 8px;
    background: var(--mui-bg-default);
    border-radius: var(--r-pill);
  }

  /* ─────────────── Map area ─────────────── */
  .map-host { flex: 1; position: relative; overflow: hidden; }
  #map { width: 100%; height: 100%; background: #1a2330; }
  .leaflet-container { font-family: 'DM Sans', sans-serif; background: #1a2330; }
  .leaflet-popup-content-wrapper { border-radius: var(--r-2); box-shadow: var(--elev-8); }
  .leaflet-popup-content { font-family: 'DM Sans', sans-serif; margin: 14px 16px; font-size: 0.8125rem; line-height: 1.5; }

  /* ─────────────── Floating overlays ─────────────── */
  .floating { position: absolute; z-index: 500; pointer-events: none; }
  .floating > * { pointer-events: auto; }

  /* MUI Paper container */
  .mui-paper {
    background: var(--mui-bg-paper);
    border-radius: var(--r-2);
    box-shadow: var(--elev-2);
  }
  .mui-paper-elev-4 { box-shadow: var(--elev-4); }
  .mui-paper-elev-8 { box-shadow: var(--elev-8); }

  /* Filter strip top-left */
  .filter-strip { top: 16px; left: 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; max-width: calc(100% - 480px); }

  .filter-paper {
    background: var(--mui-bg-paper);
    padding: 6px;
    border-radius: var(--r-2);
    box-shadow: var(--elev-4);
    display: flex; gap: 4px;
  }

  /* MUI Chip */
  .mui-chip {
    display: inline-flex; align-items: center; gap: 8px;
    height: 32px;
    padding: 0 12px;
    border-radius: var(--r-pill);
    font-size: 0.8125rem; font-weight: 500;
    color: var(--mui-text-primary);
    background: transparent;
    border: 1px solid transparent;
    transition: all 0.15s;
    cursor: pointer;
    user-select: none;
  }
  .mui-chip:hover { background: var(--mui-action-hover); }
  .mui-chip.filled { background: var(--mui-primary); color: var(--mui-primary-contrast); border-color: var(--mui-primary); }
  .mui-chip.filled.error { background: var(--mui-error); border-color: var(--mui-error); }
  .mui-chip.filled.info { background: var(--mui-info); border-color: var(--mui-info); }
  .mui-chip.filled:hover { background: var(--mui-primary-dark); }
  .mui-chip.filled.error:hover { background: var(--mui-error-dark); }
  .mui-chip.filled.info:hover { background: var(--mui-info-dark); }
  .mui-chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .mui-chip-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.6875rem; font-weight: 600;
    padding: 1px 7px;
    border-radius: var(--r-pill);
    background: rgba(0,0,0,0.06);
    color: var(--mui-text-secondary);
  }
  .mui-chip.filled .mui-chip-count {
    background: rgba(255,255,255,0.22);
    color: rgba(255,255,255,0.95);
  }

  /* MUI Button */
  .mui-btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: var(--r-1);
    font-size: 0.8125rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    border: 1px solid transparent;
  }
  .mui-btn-contained {
    background: var(--mui-primary);
    color: var(--mui-primary-contrast);
    box-shadow: var(--elev-2);
  }
  .mui-btn-contained:hover { background: var(--mui-primary-dark); box-shadow: var(--elev-4); }
  .mui-btn-outlined {
    background: transparent;
    color: var(--mui-primary);
    border-color: rgba(75,63,255,0.5);
  }
  .mui-btn-outlined:hover { background: var(--mui-action-hover); border-color: var(--mui-primary); }
  .mui-btn-text {
    background: transparent;
    color: var(--mui-primary);
    padding: 6px 10px;
    text-transform: uppercase;
  }
  .mui-btn-text:hover { background: var(--mui-action-hover); }
  .mui-btn kbd {
    font-family: 'DM Mono', monospace;
    font-size: 0.625rem;
    padding: 1px 5px;
    border-radius: 3px;
    background: rgba(0,0,0,0.08);
    margin-left: 4px;
    text-transform: none;
  }
  .mui-btn-contained kbd { background: rgba(255,255,255,0.18); }

  /* MUI IconButton */
  .mui-icon-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--mui-text-secondary);
    transition: background 0.15s;
  }
  .mui-icon-btn:hover { background: var(--mui-action-hover); color: var(--mui-text-primary); }

  /* Tool group as MUI ButtonGroup */
  .tool-group {
    display: flex; gap: 0;
    background: var(--mui-bg-paper);
    border-radius: var(--r-2);
    box-shadow: var(--elev-4);
    padding: 6px;
  }

  /* ─────────────── Anomaly stream (bottom-left) ─────────────── */
  .anomaly-stream {
    bottom: 16px; left: 16px;
    width: 380px;
    background: rgba(25, 35, 46, 0.94);
    backdrop-filter: blur(18px);
    border-radius: var(--r-2);
    border: 1px solid rgba(255,255,255,0.06);
    color: var(--mui-text-on-dark);
    overflow: hidden;
    box-shadow: var(--elev-8);
  }
  .anomaly-stream-head {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .anomaly-stream-h-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6875rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--mui-text-on-dark-secondary);
  }
  .anomaly-stream-h-count {
    font-size: 0.6875rem;
    color: #6FE39A;
    font-family: 'DM Mono', monospace;
    margin-left: auto;
  }
  .anomaly-stream-list { max-height: 280px; overflow-y: auto; }
  .anomaly-stream-item {
    display: grid;
    grid-template-columns: 4px auto 1fr auto;
    gap: 12px; align-items: center;
    padding: 10px 16px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
  }
  .anomaly-stream-item:last-child { border-bottom: none; }
  .anomaly-stream-item:hover { background: rgba(255,255,255,0.04); }
  .anomaly-stream-sev { align-self: stretch; border-radius: 2px; }
  .anomaly-stream-icon {
    width: 28px; height: 28px;
    border-radius: var(--r-1);
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.06);
    font-size: 14px;
  }
  .anomaly-stream-body { min-width: 0; }
  .anomaly-stream-title {
    font-size: 0.8125rem; font-weight: 500;
    color: var(--mui-text-on-dark);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .anomaly-stream-meta {
    font-size: 0.6875rem;
    color: var(--mui-text-on-dark-secondary);
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
    display: flex; gap: 8px; align-items: center;
  }
  .anomaly-stream-conf {
    display: inline-flex; align-items: center; gap: 4px;
    color: #6FE39A;
    font-weight: 600;
  }
  @keyframes flash { 0% { background: rgba(75,63,255,0.32); } 100% { background: transparent; } }
  .anomaly-stream-item.fresh { animation: flash 1.8s ease-out; }

  /* ─────────────── Map zoom (MUI Paper) ─────────────── */
  .map-zoom {
    bottom: 16px; right: calc(16px + 460px + 12px);
    background: var(--mui-bg-paper);
    border-radius: var(--r-2);
    box-shadow: var(--elev-4);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .map-zoom button {
    width: 38px; height: 38px;
    border-bottom: 1px solid var(--mui-divider);
    display: flex; align-items: center; justify-content: center;
    color: var(--mui-text-primary);
  }
  .map-zoom button:last-child { border-bottom: none; }
  .map-zoom button:hover { background: var(--mui-action-hover); color: var(--mui-primary); }

  /* ─────────────── MUI Drawer (right detail panel) ─────────────── */
  .drawer {
    position: absolute;
    top: 16px; right: 16px; bottom: 16px;
    width: 460px;
    background: var(--mui-bg-paper);
    border-radius: var(--r-2);
    box-shadow: var(--elev-16);
    display: flex; flex-direction: column;
    z-index: 600;
    overflow: hidden;
    transform: translateX(0);
    transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .drawer.hidden { transform: translateX(calc(100% + 32px)); pointer-events: none; }
  .drawer-head {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--mui-divider);
    flex-shrink: 0;
  }
  .drawer-h-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .drawer-id { font-family: 'DM Mono', monospace; font-size: 0.6875rem; color: var(--mui-text-secondary); margin-left: auto; }
  .drawer-title { font-size: 1.25rem; font-weight: 600; color: var(--mui-text-primary); margin-bottom: 4px; line-height: 1.35; letter-spacing: -0.01em; }
  .drawer-sub { font-size: 0.8125rem; color: var(--mui-text-secondary); }
  .drawer-sub strong { color: var(--mui-text-primary); font-weight: 600; }
  .drawer-body { flex: 1; overflow-y: auto; padding: 16px 20px 24px; }

  /* MUI Severity badge */
  .mui-badge {
    font-size: 0.6875rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: var(--r-1);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: 'DM Mono', monospace;
    line-height: 1;
  }
  .mui-badge.critical { background: rgba(222,52,35,0.12); color: var(--mui-error-dark); }
  .mui-badge.high { background: rgba(248,106,11,0.14); color: var(--mui-secondary-dark); }
  .mui-badge.medium { background: rgba(255,182,54,0.18); color: #B07F0E; }
  .mui-badge.low { background: rgba(0,149,218,0.12); color: var(--mui-info-dark); }
  .mui-badge.success { background: rgba(8,168,71,0.12); color: var(--mui-success-dark); }
  .mui-badge.primary { background: rgba(75,63,255,0.10); color: var(--mui-primary); }

  /* Section heading (MUI overline style) */
  .section-h {
    font-family: 'DM Mono', monospace;
    font-size: 0.6875rem;
    font-weight: 700;
    color: var(--mui-text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.10em;
    margin-bottom: 10px;
  }
  .section { margin-bottom: 22px; }
  .section:last-child { margin-bottom: 0; }

  /* ─────────────── Anomaly card (Material) ─────────────── */
  .anom-card {
    background: linear-gradient(180deg, #FAFAFC 0%, #F2F2F8 100%);
    border: 1px solid var(--mui-divider);
    border-radius: var(--r-3);
    overflow: hidden;
  }
  .anom-card-head {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--mui-divider);
    background: var(--mui-bg-paper);
  }
  .anom-card-method {
    flex: 1;
  }
  .anom-card-method-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.625rem;
    font-weight: 700;
    color: var(--mui-primary);
    letter-spacing: 0.10em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .anom-card-method-name {
    font-size: 0.9375rem;
    font-weight: 600;
    color: var(--mui-text-primary);
  }
  .anom-confidence {
    display: flex; flex-direction: column; align-items: center;
    flex-shrink: 0;
  }
  .anom-confidence-ring {
    position: relative;
    width: 44px; height: 44px;
  }

// ─────────────────────────────────────────────────────────────────
// Sparkline component
// ─────────────────────────────────────────────────────────────────
const Sparkline = ({ data, expected, height=40, accentColor }) => {
  if (!data || data.length === 0) return null;
  const all = [...data, ...(expected || [])];
  const min = Math.min(...all);
  const max = Math.max(...all);
  const range = max - min || 1;
  const w = 100;
  const stepX = w / (data.length - 1);
  const ptToY = (v) => height - 6 - ((v - min) / range) * (height - 12);
  const dataPath = data.map((v, i) => `${i === 0 ? "M" : "L"} ${i * stepX} ${ptToY(v)}`).join(" ");
  const expPath = expected ? expected.map((v, i) => `${i === 0 ? "M" : "L"} ${i * stepX} ${ptToY(v)}`).join(" ") : null;
  const lastPt = [stepX * (data.length - 1), ptToY(data[data.length - 1])];
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${w} ${height}`} preserveAspectRatio="none" style={{display:'block'}}>
      {expPath && <path d={expPath} stroke="#9DA5B0" strokeWidth="1" fill="none" strokeDasharray="2 2"/>}
      <path d={dataPath} stroke={accentColor || "#4B3FFF"} strokeWidth="1.6" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={lastPt[0]} cy={lastPt[1]} r="2.5" fill={accentColor || "#4B3FFF"}/>
      <circle cx={lastPt[0]} cy={lastPt[1]} r="5" fill={accentColor || "#4B3FFF"} opacity="0.25"/>
    </svg>
  );
};

  return (

        <div className="anom-card-method">
          <div className="anom-card-method-label">Detection method</div>

              <circle className="anom-confidence-track" cx="22" cy="22" r={r}/>

            </svg>
            <div className="anom-confidence-text">{conf}%</div>
          </div>
          <div className="anom-confidence-label">CONF</div>

          <span className={"mui-badge " + (obj.severity || "low")}>{typeLabel}</span>
          <span className="drawer-id">{obj.id}</span>
          <button className="mui-icon-btn" onClick={onClose}><Icon name="x" size={16}/></button>
        </div>
        <div className="drawer-title">{obj.title || obj.name}</div>
        <div className="drawer-sub">
          <strong>{obj.address || ""}</strong>
          {obj.detectedAt && <span> · detected {fmtRelative(obj.detectedAt)} via {obj.source}</span>}
          {obj.reportedAt && <span> · reported {fmtRelative(obj.reportedAt)}</span>}
          {obj.type === "vehicle" && <span> · {obj.status}</span>}
        </div>
      </div>
      <div className="drawer-body">

        {/* Evidence image */}
        {(obj.type === "anomaly" || obj.type === "incident") && (
          <div className="evidence-image" style={{background: obj.category === "accident" ? "linear-gradient(135deg, #6b3a3a 0%, #3a2020 100%)" : "linear-gradient(135deg, #4a5568 0%, #2d3748 100%)"}}>
            <div className="evidence-mark"><div className="ring"></div><div className="label">{obj.category === "pothole" ? `${obj.depth_cm}cm depth` : obj.category === "accident" ? "Live · 2 vehicles" : obj.category === "ada" ? "slope 9.4°" : "Anomaly point"}</div></div>
            <div className="evidence-meta">
              <span className="evidence-tag">{obj.source || "Live"}</span>
              {obj.type === "anomaly" && obj.source.includes("LiDAR") && <span className="evidence-tag">±0.7cm precision</span>}
              {obj.type === "incident" && <span className="evidence-tag">Dispatch live</span>}
            </div>
          </div>
        )}

        {/* Anomaly Detection card — front and center for anomalies/incidents */}
        {showAnomalyCard && (
          <div className="section">
            <div className="section-h">Why this was flagged</div>
            <AnomalyCard anomaly={obj.anomaly}/>
          </div>
        )}

        {/* Description */}
        {obj.description && (
          <div className="section">
            <div className="section-h">Anomaly summary</div>
            <div className="mui-body1" style={{color:'var(--mui-text-primary)', fontSize:'0.875rem', lineHeight:1.6}}>{obj.description}</div>
          </div>
        )}

        {/* Key facts */}
        <div className="section">
          <div className="section-h">Key facts</div>
          {obj.type === "anomaly" && obj.category === "pothole" && (
            <>
              <div className="mui-list-row"><div className="mui-list-label">Pavement score</div><div className="mui-list-value big" style={{color: obj.severity === "critical" ? "var(--mui-error)" : "var(--mui-secondary)"}}>{obj.pci} / 100</div></div>
              <div className="mui-list-row"><div className="mui-list-label">Trend</div><div className="mui-list-value">{obj.pciTrend} pts in 6 weeks</div></div>
              <div className="mui-list-row"><div className="mui-list-label">Largest pothole</div><div className="mui-list-value mono">{obj.depth_cm}cm × {obj.area_sqm || "—"}m²</div></div>
              <div className="mui-list-row"><div className="mui-list-label">Linked permit</div><div className="mui-list-value mono">{obj.linkedPermit || "none"}</div></div>
              <div className="mui-list-row"><div className="mui-list-label">Parcel</div><div className="mui-list-value mono">{obj.parcelId}</div></div>
            </>
          )}
          {obj.type === "anomaly" && obj.category !== "pothole" && (
            <>
              {obj.parcelId && <div className="mui-list-row"><div className="mui-list-label">Parcel</div><div className="mui-list-value mono">{obj.parcelId}</div></div>}
              <div className="mui-list-row"><div className="mui-list-label">Detection source</div><div className="mui-list-value">{obj.source}</div></div>
              <div className="mui-list-row"><div className="mui-list-label">Detected</div><div className="mui-list-value mono">{fmtRelative(obj.detectedAt)}</div></div>
              <div className="mui-list-row"><div className="mui-list-label">Severity</div><div className="mui-list-value" style={{textTransform:'capitalize', fontWeight:700}}>{obj.severity}</div></div>
            </>
          )}
          {obj.type === "incident" && (
            <>
              <div className="mui-list-row"><div className="mui-list-label">Status</div><div className="mui-list-value" style={{textTransform:'capitalize', fontWeight:700, color:'var(--mui-secondary-dark)'}}>{obj.status}</div></div>
              <div className="mui-list-row"><div className="mui-list-label">Units on scene</div><div className="mui-list-value">{obj.units.join(", ")}</div></div>
              <div className="mui-list-row"><div className="mui-list-label">Lanes blocked</div><div className="mui-list-value">{obj.lanes_blocked} of total</div></div>
              <div className="mui-list-row"><div className="mui-list-label">Reported</div><div className="mui-list-value mono">{fmtRelative(obj.reportedAt)}</div></div>
            </>
          )}
          {obj.type === "vehicle" && (
            <>
              <div className="mui-list-row"><div className="mui-list-label">Vehicle</div><div className="mui-list-value">{obj.yearMakeModel}</div></div>
              <div className="mui-list-row"><div className="mui-list-label">Driver</div><div className="mui-list-value">{obj.driver}</div></div>
              <div className="mui-list-row"><div className="mui-list-label">Speed</div><div className="mui-list-value mono">{obj.speed} mph</div></div>
              <div className="mui-list-row"><div className="mui-list-label">Fuel</div><div className="mui-list-value">{obj.fuelPct}%</div></div>
              <div className="mui-list-row"><div className="mui-list-label">Odometer</div><div className="mui-list-value mono">{obj.odometer.toLocaleString()} mi</div></div>
              {obj.fault && <div className="mui-list-row"><div className="mui-list-label">Fault code</div><div className="mui-list-value mono" style={{color:'var(--mui-error)'}}>{obj.fault}</div></div>}
            </>
          )}
          {obj.type === "permit" && (
            <>
              <div className="mui-list-row"><div className="mui-list-label">Status</div><div className="mui-list-value">{obj.status}</div></div>
              <div className="mui-list-row"><div className="mui-list-label">Contractor</div><div className="mui-list-value">{obj.contractor}</div></div>
              <div className="mui-list-row"><div className="mui-list-label">Issued</div><div className="mui-list-value mono">{obj.issued}</div></div>
              <div className="mui-list-row"><div className="mui-list-label">Expires</div><div className="mui-list-value mono">{obj.expires}</div></div>
              <div className="mui-list-row"><div className="mui-list-label">Parcel</div><div className="mui-list-value mono">{obj.parcelId}</div></div>
            </>
          )}
        </div>

        {/* Recommendation banner */}
        {obj.recommendation && (
          <div className="section">
            <div className="recommendation">
              <div className="recommendation-icon">💡</div>
              <div className="recommendation-text">
                <strong>Recommended response:</strong> {obj.recommendation}
              </div>
            </div>
          </div>
        )}

        {/* ACTIONS */}
        {actions.length > 0 && (
          <div className="section">
            <div className="section-h">Take action</div>
            <div className="actions">
              {actions.map(a => (
                <button key={a.key} className={"action-btn" + (a.primary ? " primary" : "") + (a.danger ? " danger" : "")} onClick={() => onAction(a)}>
                  <span className="action-icon">{a.icon}</span>
                  <div className="action-body">
                    <div className="action-title">{a.title}</div>
                    <div className="action-sub">{a.sub}</div>
                  </div>
                  <Icon name="arrow-right" size={16} className="action-arrow"/>
                </button>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ─────────────────────────────────────────────────────────────────
// Snackbar / toasts
// ─────────────────────────────────────────────────────────────────
const Snackbars = ({ toasts }) => (
  <div className="snackbar-stack">
    {toasts.map(t => (
      <div key={t.id} className={"snackbar " + (t.color || "")}>
        <div className="snackbar-icon">{t.icon || "✓"}</div>
        <div>
          <div className="snackbar-title">{t.title}</div>
          <div className="snackbar-sub">{t.sub}</div>
        </div>
      </div>
    ))}
  </div>
);

// ─────────────────────────────────────────────────────────────────
// Main App
// ─────────────────────────────────────────────────────────────────
const App = () => {
  const mapRef = React.useRef(null);
  const layersRef = React.useRef({ anomalies: null, incidents: null, fleet: null, permits: null });
  const selectionRef = React.useRef({ start: null, circle: null });

  const [filters, setFilters] = React.useState({ anomalies: true, incidents: true, fleet: true, permits: false });
  const [selected, setSelected] = React.useState(null);
  const [area, setArea] = React.useState(null);
  const [selectMode, setSelectMode] = React.useState(false);
  const [events, setEvents] = React.useState(buildEvents());
  const [freshIds, setFreshIds] = React.useState(new Set());
  const [toasts, setToasts] = React.useState([]);

  const showToast = (t) => {
    const id = Date.now() + Math.random();
    setToasts(ts => [...ts, { id, ...t }]);
    setTimeout(() => setToasts(ts => ts.filter(x => x.id !== id)), 5000);
  };

  // Init map
  React.useEffect(() => {
    if (mapRef.current) return;
    const map = L.map('map', { zoomControl: false, attributionControl: false, doubleClickZoom: false }).setView(CITY.center, 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19, subdomains: 'abcd' }).addTo(map);
    mapRef.current = map;

    // Build layers
    const anomGroup = L.layerGroup();
    ANOMALIES.forEach(i => {
      const sevColor = i.severity === "critical" ? "#DE3423" : i.severity === "high" ? "#F86A0B" : i.severity === "medium" ? "#FFB636" : "#0095DA";
      const html = i.severity === "critical"
        ? `<div class="live-marker"><div class="pulse-ring" style="background:${sevColor}"></div><div class="core" style="background:${sevColor}">!</div></div>`
        : `<div style="background:${sevColor};color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.5);font-size:11px;font-weight:700">!</div>`;
      const m = L.marker(i.location, { icon: L.divIcon({ html, className: '', iconSize: [28,28], iconAnchor: [14,14] }) });
      m.on('click', () => { setSelected(i); setArea(null); });
      anomGroup.addLayer(m);
    });
    layersRef.current.anomalies = anomGroup;

    const incGroup = L.layerGroup();
    INCIDENTS.forEach(i => {
      const html = `<div class="live-marker"><div class="pulse-ring" style="background:#DE3423"></div><div class="core" style="background:#DE3423">${i.category === "accident" ? "🚨" : i.category === "water_main" ? "💧" : "🌳"}</div></div>`;
      const m = L.marker(i.location, { icon: L.divIcon({ html, className: '', iconSize: [28,28], iconAnchor: [14,14] }) });
      m.on('click', () => { setSelected(i); setArea(null); });
      incGroup.addLayer(m);
    });
    layersRef.current.incidents = incGroup;

    const fleetGroup = L.layerGroup();
    VEHICLES.forEach(v => {
      const html = `<div style="background:${v.color};color:#fff;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.5);font-size:14px">${v.icon}</div>`;
      const m = L.marker(v.location, { icon: L.divIcon({ html, className: '', iconSize: [30,30], iconAnchor: [15,15] }) });
      m.on('click', () => { setSelected(v); setArea(null); });
      fleetGroup.addLayer(m);
    });
    layersRef.current.fleet = fleetGroup;

    const permGroup = L.layerGroup();
    PERMITS.forEach(p => {
      const html = `<div style="background:#5069FF;color:#fff;border-radius:4px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.4);font-size:11px;font-weight:700">P</div>`;
      const m = L.marker(p.location, { icon: L.divIcon({ html, className: '', iconSize: [22,22], iconAnchor: [11,11] }) });
      m.on('click', () => { setSelected(p); setArea(null); });
      permGroup.addLayer(m);
    });
    layersRef.current.permits = permGroup;

    // Apply default filters
    Object.keys(filters).forEach(k => {
      if (filters[k] && layersRef.current[k]) layersRef.current[k].addTo(map);
    });

    // Keyboard shortcuts
    const onKey = (e) => {
      if (e.key === "Escape") { setSelected(null); setArea(null); setSelectMode(false); }
      if ((e.key === "s" || e.key === "S") && !e.target.matches?.('input, textarea')) {
        setSelectMode(s => !s);
      }
    };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, []);

  // Re-apply filter visibility
  React.useEffect(() => {
    if (!mapRef.current) return;
    Object.keys(filters).forEach(k => {
      const g = layersRef.current[k];
      if (!g) return;
      if (filters[k]) {
        if (!mapRef.current.hasLayer(g)) g.addTo(mapRef.current);
      } else {
        if (mapRef.current.hasLayer(g)) mapRef.current.removeLayer(g);
      }
    });
  }, [filters]);

  // Selection mode
  React.useEffect(() => {
    const map = mapRef.current; if (!map) return;
    if (!selectMode) { map.dragging.enable(); return; }
    map.dragging.disable();

    let startLatLng = null, circle = null;
    const onDown = (e) => {
      startLatLng = e.latlng;
      if (circle) { map.removeLayer(circle); circle = null; }
      circle = L.circle(startLatLng, { radius: 1, color: "#4B3FFF", weight: 2, fillColor: "#4B3FFF", fillOpacity: 0.12, dashArray: "6 4" }).addTo(map);
    };
    const onMove = (e) => {
      if (!startLatLng || !circle) return;
      circle.setRadius(map.distance(startLatLng, e.latlng));
    };
    const onUp = (e) => {
      if (!startLatLng || !circle) return;
      const r = map.distance(startLatLng, e.latlng);
      if (r < 50) { map.removeLayer(circle); circle = null; startLatLng = null; return; }
      selectionRef.current.circle = circle;
      setArea({ center: [startLatLng.lat, startLatLng.lng], radius: r });
      setSelected(null);
      setSelectMode(false);
      startLatLng = null;
    };
    map.on('mousedown', onDown);
    map.on('mousemove', onMove);
    map.on('mouseup', onUp);
    return () => {
      map.off('mousedown', onDown); map.off('mousemove', onMove); map.off('mouseup', onUp);
      if (circle && !selectionRef.current.circle) map.removeLayer(circle);
    };
  }, [selectMode]);

  React.useEffect(() => {
    if (!area && selectionRef.current.circle && mapRef.current) {
      mapRef.current.removeLayer(selectionRef.current.circle);
      selectionRef.current.circle = null;
    }
  }, [area]);

  // Live event injection
  React.useEffect(() => {
    const titles = [
      { title: "Surface defect detected — Sycamore & 2nd", category: "pothole", severity: "high", source: "AI Vision", confidence: 0.94 },
      { title: "Sudden brake event on Highland Ave (4.2σ)", category: "vehicle", severity: "medium", source: "Telematics", confidence: 0.88 },
      { title: "Unpermitted sign detected on Court Sq", category: "sign", severity: "low", source: "AI Vision", confidence: 0.91 },
      { title: "Hydrant flow anomaly — FH-118", category: "drainage", severity: "medium", source: "IoT Sensor", confidence: 0.96 },
      { title: "Streetlight outage cluster — Park Ave", category: "code", severity: "low", source: "IoT Sensor", confidence: 0.99 }
    ];
    let i = 0;
    const interval = setInterval(() => {
      const t = titles[i % titles.length];
      const id = "EVT-" + Date.now();
      const fresh = { id, time: new Date().toISOString(), source: t.source, severity: t.severity, title: t.title, type: "anomaly", confidence: t.confidence, obj: { id, title: t.title, category: t.category } };
      setEvents(es => [fresh, ...es].slice(0, 30));
      setFreshIds(s => { const n = new Set(s); n.add(id); return n; });
      setTimeout(() => setFreshIds(s => { const n = new Set(s); n.delete(id); return n; }), 2000);
      i++;
    }, 18000);
    return () => clearInterval(interval);
  }, []);

  const handleAction = (action) => {
    showToast({ ...action.toast, color: action.danger ? "red" : action.primary ? "purple" : "" });
  };

  const handleSearch = (obj) => {
    if (mapRef.current && obj.location) {
      mapRef.current.flyTo(obj.location, 17, { duration: 0.6 });
      setTimeout(() => { setSelected(obj); setArea(null); }, 600);
    }
  };

  return (
    <>
      <AppBar events={events} onSearch={handleSearch}/>
      <div className={"map-host" + (selectMode ? " selecting" : "")}>
        <div id="map"></div>

        <FilterStrip
          filters={filters} setFilters={setFilters}
          selectMode={selectMode} onToggleSelect={() => setSelectMode(s => !s)}
          onClearArea={() => setArea(null)} hasArea={!!area}
        />

        {selectMode && (
          <div className="selection-banner">
            <Icon name="lasso" size={14}/>
            Drag on the map to draw a selection circle
            <kbd>ESC</kbd> to cancel
          </div>
        )}

        <AnomalyStream events={events} freshIds={freshIds} onClick={(obj) => {
          if (obj.location && mapRef.current) mapRef.current.flyTo(obj.location, 16, { duration: 0.5 });
          if (obj.id) {
            setSelected(obj);
            setArea(null);
          }
        }}/>

        <div className="floating map-zoom">
          <button onClick={() => mapRef.current?.zoomIn()}><Icon name="plus" size={14}/></button>
          <button onClick={() => mapRef.current?.zoomOut()}><Icon name="minus" size={14}/></button>
        </div>

        {!selected && !area && !selectMode && (
          <div className="floating hint-card">
            <div className="hint-title">Get started</div>
            <div className="hint-list">
              → Click any marker to inspect the anomaly and act<br/>
              → Press <kbd>S</kbd> or use <strong>Select area</strong> to lasso a region<br/>
              → Use search <kbd>⌘K</kbd> to jump to any object
            </div>
          </div>
        )}

        <Drawer
          obj={selected} area={area}
          onClose={() => { setSelected(null); setArea(null); }}
          onAction={handleAction}
        />
      </div>
      <Snackbars toasts={toasts}/>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
